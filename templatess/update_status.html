<!DOCTYPE html>

<html>

<head>

```
<title>CrimeLens AI - Update Status</title>

<style>

    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family:'Segoe UI',sans-serif;
    }

    body{
        background:#f8fafc;
        min-height:100vh;
    }

    .navbar{

        height:90px;

        background:
        linear-gradient(
            90deg,
            #0f172a,
            #1e3a8a
        );

        display:flex;

        align-items:center;

        padding-left:30px;

        color:white;
    }

    .navbar img{

        width:60px;
        height:60px;

        margin-right:15px;
    }

    .brand h1{

        font-size:28px;
    }

    .brand p{

        color:#cbd5e1;
        font-size:14px;
    }

    .container{

        display:flex;

        justify-content:center;

        align-items:center;

        height:calc(100vh - 90px);
    }

    .card{

        width:550px;

        background:white;

        padding:40px;

        border-radius:15px;

        box-shadow:
        0px 5px 15px
        rgba(0,0,0,0.08);
    }

    .card h2{

        color:#1e3a8a;

        margin-bottom:15px;
    }

    .card p{

        color:#64748b;

        margin-bottom:25px;
    }

    label{

        display:block;

        margin-bottom:10px;

        font-weight:600;
    }

    select{

        width:100%;

        padding:14px;

        border:1px solid #d1d5db;

        border-radius:10px;

        margin-bottom:25px;

        font-size:15px;
    }

    button{

        width:100%;

        border:none;

        padding:15px;

        border-radius:10px;

        color:white;

        font-size:16px;

        cursor:pointer;

        background:
        linear-gradient(
            90deg,
            #2563eb,
            #38bdf8
        );
    }

    button:hover{

        opacity:0.9;
    }

</style>
```

</head>

<body>

```
<div class="navbar">

    <img
        src="/static/logo.png"
        alt="CrimeLens AI">

    <div class="brand">

        <h1>

            CrimeLens AI

        </h1>

        <p>

            AI-Powered Crime Analysis &
            Investigation Platform

        </p>

    </div>

</div>

<div class="container">

    <div class="card">

        <h2>

            Update Complaint Status

        </h2>

        <p>

            Modify the investigation status
            of the selected complaint.

        </p>

        <form action="" method="post">

            <label>

                Status

            </label>

            <select name="status">

                <option>
                    Pending
                </option>

                <option>
                    Under Investigation
                </option>

                <option>
                    Closed
                </option>

            </select>

            <button type="submit">

                Update Status

            </button>

        </form>

    </div>

</div>
```

</body>

</html>
